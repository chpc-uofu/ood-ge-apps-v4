description: |
  This app will launch a nf-core pipeline of your choosing. 

  Each pipeline can require several different parameters as input, each parameter unique to each pipeline.

  Please research the required inputs to your nf-core pipeline here: https://nf-co.re/pipelines/. If you have any questions or need assistance, please email the CHPC helpdesk at helpdesk@chpc.utah.edu

  To keep this form simple, a YAML file is required for all pipeline parameters. This is described on each pipeline's documentation. Please reach out to the CHPC if you need assistance putting the yaml file together.